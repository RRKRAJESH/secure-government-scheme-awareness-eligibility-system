<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="240" stroke="#000080" stroke-width="16" fill="none"></circle>

  <!-- Inner circle -->
  <circle cx="256" cy="256" r="20" fill="#000080"></circle>

  <!-- 24 spokes -->
  <g stroke="#000080" stroke-width="8">
    <!-- Generate 24 lines rotated -->
    <!-- One line -->
    <line x1="256" y1="256" x2="256" y2="40"></line>
    
    <!-- Rotations -->
    <g transform="rotate(15 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(30 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(45 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(60 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(75 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(90 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(105 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(120 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(135 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(150 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(165 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(180 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(195 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(210 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(225 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(240 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(255 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(270 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(285 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(300 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(315 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(330 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
    <g transform="rotate(345 256 256)"><line x1="256" y1="256" x2="256" y2="40"></line></g>
  </g>
